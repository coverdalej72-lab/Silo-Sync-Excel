kind = "video"
previewPath = "/how-to-video/"
title = "Farm Buddy — How It Works"
version = "1.0.0"
id = "artifacts/how-to-video"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/how-to-video/" ]
localPort = 8080

[services.development]
run = "pnpm --filter @workspace/how-to-video run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/how-to-video", "run", "build" ]
publicDir = "artifacts/how-to-video/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20961"
BASE_PATH = "/how-to-video/"
