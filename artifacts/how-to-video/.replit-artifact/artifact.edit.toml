kind = "video"
previewPath = "/ops/"
title = "Farm Buddy — Operations"
version = "1.0.0"
id = "artifacts/how-to-video"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = ["/ops/"]
localPort = 20961

[services.development]
run = "pnpm --filter @workspace/how-to-video run dev"

[services.production]
build = ["pnpm", "--filter", "@workspace/how-to-video", "run", "build"]
publicDir = "artifacts/how-to-video/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20961"
BASE_PATH = "/ops/"
