    <meta name="twitter:card" content="summary_large_image" />

    <script>
      (function() {
        var t = localStorage.getItem("silo-theme");
        if (t === "dark" || (!t && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
