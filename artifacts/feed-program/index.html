    <link rel="preload" href="%BASE_URL%feed-program.xlsx" as="fetch" crossorigin="anonymous">

    <script>
      (function() {
        var t = localStorage.getItem("silo-theme");
        if (t === "dark" || (!t && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <div id="html-splash" style="min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0f3d24;gap:16px;">
        <img src="%BASE_URL%logo.png" alt="Farm Buddy" style="height:56px;width:auto;" onerror="this.style.display='none'" />
        <div style="width:36px;height:36px;border-radius:50%;border:4px solid rgba(255,255,255,0.3);border-top-color:#fff;animation:sp 0.8s linear infinite;"></div>
        <p style="color:rgba(255,255,255,0.8);font-family:sans-serif;font-size:14px;margin:0;">Loading Broiler Base Mate…</p>
        <style>@keyframes sp{to{transform:rotate(360deg)}}</style>
      </div>
    </div>
    <script>
      // Remove splash once React mounts
      document.addEventListener("DOMContentLoaded", function() {
        var obs = new MutationObserver(function() {
          var splash = document.getElementById("html-splash");
          if (splash && document.getElementById("root").children.length > 1) {
            splash.remove(); obs.disconnect();
          }
        });
        obs.observe(document.getElementById("root"), { childList: true, subtree: true });
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
