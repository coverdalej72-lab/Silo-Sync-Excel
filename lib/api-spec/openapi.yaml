openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Silo Reader API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: sheds
  - name: readings
  - name: deliveries

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /shed-groups:
    get:
      operationId: listShedGroups
      tags: [sheds]
      summary: List all shed groups with their silos
      responses:
        "200":
          description: Shed groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ShedGroup"

  /readings/today:
    get:
      operationId: getTodayProgress
      tags: [readings]
      summary: Get today's reading progress per shed group
      responses:
        "200":
          description: Today's progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TodayProgress"

  /readings/batch:
    post:
      operationId: batchCreateReadings
      tags: [readings]
      summary: Save readings for a shed group in one go
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchCreateReadingsBody"
      responses:
        "201":
          description: Readings saved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reading"
        "400":
          description: Invalid input

  /readings:
    get:
      operationId: listReadings
      tags: [readings]
      summary: List all readings newest first
      parameters:
        - name: siloId
          in: query
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Readings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reading"

  /readings/{id}:
    delete:
      operationId: deleteReading
      tags: [readings]
      summary: Delete a reading
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /silos:
    get:
      operationId: listSilos
      tags: [sheds]
      summary: List silos for the current farm
      responses:
        "200":
          description: Silos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Silo"
    post:
      operationId: createSilo
      tags: [sheds]
      summary: Create a silo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSiloBody"
      responses:
        "201":
          description: Silo created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Silo"
        "400":
          description: Invalid input

  /silos/{id}:
    patch:
      operationId: updateSilo
      tags: [sheds]
      summary: Update a silo's name or default feed type
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSiloBody"
      responses:
        "200":
          description: Silo updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Silo"
        "404":
          description: Not found
    delete:
      operationId: deleteSilo
      tags: [sheds]
      summary: Delete a silo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /deliveries:
    get:
      operationId: listDeliveries
      tags: [deliveries]
      summary: List all deliveries newest first
      responses:
        "200":
          description: Deliveries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Delivery"
    post:
      operationId: createDelivery
      tags: [deliveries]
      summary: Record a delivery
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDeliveryBody"
      responses:
        "201":
          description: Delivery recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Delivery"
        "400":
          description: Invalid input

  /deliveries/{id}:
    delete:
      operationId: deleteDelivery
      tags: [deliveries]
      summary: Delete a delivery
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /onedrive/status:
    get:
      operationId: getOnedriveStatus
      tags: [readings]
      summary: Cloud sync status
      responses:
        "200":
          description: Status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnedriveStatus"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Silo:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        defaultFeedType:
          type: ["string", "null"]
      required: [id, name, defaultFeedType]

    CreateSiloBody:
      type: object
      properties:
        name:
          type: string
        defaultFeedType:
          type: ["string", "null"]
      required: [name]

    UpdateSiloBody:
      type: object
      properties:
        name:
          type: string
        defaultFeedType:
          type: ["string", "null"]

    SiloInfo:
      type: object
      properties:
        id:
          type: integer
        letter:
          type: string
        name:
          type: string
        defaultFeedType:
          type: ["string", "null"]
      required: [id, letter, name, defaultFeedType]

    ShedGroup:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        displayOrder:
          type: integer
        silos:
          type: array
          items:
            $ref: "#/components/schemas/SiloInfo"
      required: [id, name, displayOrder, silos]

    TodaySiloStatus:
      type: object
      properties:
        siloId:
          type: integer
        letter:
          type: string
        name:
          type: string
        saved:
          type: boolean
        readingId:
          type: ["integer", "null"]
        amountRemaining:
          type: ["number", "null"]
        feedType:
          type: ["string", "null"]
        unit:
          type: ["string", "null"]
      required: [siloId, letter, name, saved, readingId, amountRemaining, feedType, unit]

    TodayShedStatus:
      type: object
      properties:
        shedGroupId:
          type: integer
        shedGroupName:
          type: string
        allSaved:
          type: boolean
        silos:
          type: array
          items:
            $ref: "#/components/schemas/TodaySiloStatus"
      required: [shedGroupId, shedGroupName, allSaved, silos]

    TodayProgress:
      type: object
      properties:
        date:
          type: string
        savedCount:
          type: integer
        totalCount:
          type: integer
        sheds:
          type: array
          items:
            $ref: "#/components/schemas/TodayShedStatus"
      required: [date, savedCount, totalCount, sheds]

    SiloReadingInput:
      type: object
      properties:
        siloId:
          type: integer
        feedType:
          type: string
        amountRemaining:
          type: number
        unit:
          type: string
        notes:
          type: ["string", "null"]
      required: [siloId, feedType, amountRemaining, unit]

    BatchCreateReadingsBody:
      type: object
      properties:
        readings:
          type: array
          items:
            $ref: "#/components/schemas/SiloReadingInput"
        readingDate:
          type: ["string", "null"]
      required: [readings]

    Reading:
      type: object
      properties:
        id:
          type: integer
        siloId:
          type: integer
        siloName:
          type: string
        siloLetter:
          type: string
        shedGroupName:
          type: string
        feedType:
          type: string
        amountRemaining:
          type: number
        unit:
          type: string
        notes:
          type: ["string", "null"]
        readingDate:
          type: string
        createdAt:
          type: string
      required:
        - id
        - siloId
        - siloName
        - siloLetter
        - shedGroupName
        - feedType
        - amountRemaining
        - unit
        - notes
        - readingDate
        - createdAt

    Delivery:
      type: object
      properties:
        id:
          type: integer
        shedGroupId:
          type: ["integer", "null"]
        shedGroupName:
          type: ["string", "null"]
        siloId:
          type: ["integer", "null"]
        siloLetter:
          type: ["string", "null"]
        feedType:
          type: string
        amount:
          type: number
        unit:
          type: string
        notes:
          type: ["string", "null"]
        deliveryDate:
          type: string
        createdAt:
          type: string
      required:
        - id
        - shedGroupId
        - shedGroupName
        - siloId
        - siloLetter
        - feedType
        - amount
        - unit
        - notes
        - deliveryDate
        - createdAt

    CreateDeliveryBody:
      type: object
      properties:
        shedGroupId:
          type: ["integer", "null"]
        siloId:
          type: ["integer", "null"]
        feedType:
          type: string
        amount:
          type: number
        unit:
          type: string
        notes:
          type: ["string", "null"]
        deliveryDate:
          type: ["string", "null"]
      required: [feedType, amount, unit]

    OnedriveStatus:
      type: object
      properties:
        onedriveConnected:
          type: boolean
        onedriveFileId:
          type: ["string", "null"]
        onedriveFileName:
          type: ["string", "null"]
        gdriveConnected:
          type: boolean
        gdriveFileId:
          type: ["string", "null"]
        gdriveFileName:
          type: ["string", "null"]
      required:
        - onedriveConnected
        - onedriveFileId
        - onedriveFileName
        - gdriveConnected
        - gdriveFileId
        - gdriveFileName
